<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- خلفية متدرّجة أزرق → بنفسجي -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="55%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- توهّج علوي خفيف -->
    <radialGradient id="glow" cx="30%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- تدرّج رمز الكود -->
    <linearGradient id="codeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- ظل الورقة -->
    <filter id="paperShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0b1437" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- الخلفية -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- ورقة الكشكول -->
  <rect x="104" y="78" width="304" height="356" rx="22" fill="#fffef9" filter="url(#paperShadow)"/>

  <!-- خط الهامش الأحمر -->
  <line x1="158" y1="96" x2="158" y2="416" stroke="#f4a8a8" stroke-width="5" opacity="0.85"/>

  <!-- ثقوب التجليد الحلزوني -->
  <g fill="url(#bgGrad)">
    <circle cx="104" cy="150" r="14"/>
    <circle cx="104" cy="256" r="14"/>
    <circle cx="104" cy="362" r="14"/>
  </g>
  <!-- حلقات التجليد المعدنية -->
  <g stroke="#cbd5e1" stroke-width="6" fill="none">
    <path d="M104 136 q-26 14 0 28"/>
    <path d="M104 242 q-26 14 0 28"/>
    <path d="M104 348 q-26 14 0 28"/>
  </g>

  <!-- رمز البرمجة </> -->
  <text x="268" y="248"
        font-family="'Courier New', monospace"
        font-size="116" font-weight="900"
        fill="url(#codeGrad)" text-anchor="middle">&lt;/&gt;</text>

  <!-- خطوط الكشكول أسفل الرمز -->
  <g stroke="#cfe0f0" stroke-width="7" stroke-linecap="round">
    <line x1="186" y1="300" x2="386" y2="300"/>
    <line x1="186" y1="334" x2="386" y2="334"/>
    <line x1="186" y1="368" x2="340" y2="368"/>
  </g>

  <!-- اسم التطبيق -->
  <text x="256" y="412"
        font-family="Arial, 'Segoe UI', sans-serif"
        font-size="30" font-weight="900"
        fill="#1e3a8a" text-anchor="middle">دفتر البرمجة</text>
</svg>
